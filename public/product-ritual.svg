<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 960" role="img" aria-labelledby="title desc">
  <title id="title">Bal Coffee mug and bag</title>
  <desc id="desc">A warm tabletop scene with a Bal Coffee bag, a filled mug, date seeds, and soft morning light.</desc>
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4ecdc"/>
      <stop offset="0.58" stop-color="#dfcfb5"/>
      <stop offset="1" stop-color="#a97d53"/>
    </linearGradient>
    <linearGradient id="table" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#b8956f"/>
      <stop offset="1" stop-color="#805b3b"/>
    </linearGradient>
    <linearGradient id="bag" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ead6b0"/>
      <stop offset="1" stop-color="#b88750"/>
    </linearGradient>
    <linearGradient id="brew" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#744322"/>
      <stop offset="1" stop-color="#261208"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="10%" r="70%">
      <stop offset="0" stop-color="#fff8ea" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#fff1d3" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#fff1d3" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="34" stdDeviation="32" flood-color="#3d2919" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="1200" height="960" fill="url(#wall)"/>
  <rect width="1200" height="960" fill="url(#glow)"/>
  <rect y="732" width="1200" height="228" fill="url(#table)"/>
  <ellipse cx="610" cy="786" rx="430" ry="58" fill="#3a2416" opacity="0.18"/>

  <g opacity="0.9">
    <rect x="470" y="162" width="222" height="154" fill="#ded1b4"/>
    <ellipse cx="581" cy="162" rx="111" ry="28" fill="#c8b487"/>
    <path d="M581 160 C 525 84 475 48 408 32 C 455 92 504 144 552 168" fill="#5e6d3f"/>
