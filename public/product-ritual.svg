    <line x1="790" y1="478" x2="966" y2="478" stroke="#7a5531" stroke-width="2"/>
    <text x="878" y="548" text-anchor="middle" fill="#2a1f17" font-family="Georgia, serif" font-size="30" font-weight="600">EASTERN BREW</text>
    <text x="878" y="586" text-anchor="middle" fill="#7a5531" font-family="monospace" font-size="17" letter-spacing="4">DATE SEED COFFEE</text>
