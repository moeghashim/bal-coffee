    <path d="M190 482 Q 190 436 248 436 L 456 436 Q 514 436 514 482 L 514 682 Q 514 746 434 746 L 270 746 Q 190 746 190 682 Z" fill="#fbf4e8" stroke="#a98b67" stroke-width="5"/>
    <ellipse cx="352" cy="444" rx="153" ry="31" fill="#f7efe1" stroke="#a98b67" stroke-width="4"/>
    <ellipse cx="352" cy="443" rx="132" ry="22" fill="url(#brew)"/>
    <ellipse cx="352" cy="438" rx="95" ry="13" fill="#bf8c62" opacity="0.64"/>
    <path d="M514 510 Q 610 522 610 592 Q 610 662 514 674" fill="none" stroke="#a98b67" stroke-width="17" stroke-linecap="round"/>
    <path d="M514 536 Q 577 546 577 592 Q 577 638 514 648" fill="none" stroke="#fbf4e8" stroke-width="9" stroke-linecap="round"/>
